version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: sft-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: smart_financial_manager
    networks:
      - sft-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sft-backend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongodb:27017/smart_financial_manager
      - JWT_SECRET=${JWT_SECRET}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost}
    depends_on:
      - mongodb
    restart: unless-stopped
    networks:
      - sft-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sft-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - sft-network

volumes:
  mongodb_data:

networks:
  sft-network:
    driver: bridge
