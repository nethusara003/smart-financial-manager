name: Deploy to Production

on:
  workflow_dispatch:
  # Uncomment the lines below after setting up all GitHub Secrets
  # push:
  #   branches: [main]

env:
  NODE_VERSION: '20.x'

jobs:
  # Pre-deployment tests will run via branch protection rules
  # Uncomment below to add explicit test step
  # test-before-deploy:
  #   name: Pre-Deployment Tests
  #   uses: ./.github/workflows/ci.yml

  deploy-frontend:
    name: Deploy Frontend
    # needs: test-before-deploy
    runs-on: ubuntu-latest
    environment:
      name: production-frontend
      url: https://your-app.vercel.app

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./frontend
          vercel-args: '--prod'

  deploy-backend:
    name: Deploy Backend
    # needs: test-before-deploy
    runs-on: ubuntu-latest
    environment:
      name: production-backend
      url: https://your-api.onrender.com

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to Render
        uses: johnbeynon/render-deploy-action@v0.0.8
        with:
          service-id: ${{ secrets.RENDER_SERVICE_ID }}
          api-key: ${{ secrets.RENDER_API_KEY }}

      - name: Wait for Deployment
        run: sleep 60

      - name: Health Check
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" ${{ secrets.BACKEND_URL_PRODUCTION }}/health)
          if [ $response -ne 200 ]; then
            echo "Health check failed with status $response"
            exit 1
          fi
          echo "Health check passed"
