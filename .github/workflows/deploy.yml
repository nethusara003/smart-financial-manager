name: Deploy to Production

on:
  workflow_dispatch:
  # Uncomment the lines below after setting up all GitHub Secrets
  # push:
  #   branches: [main]

env:
  NODE_VERSION: '20.x'

jobs:
  test-before-deploy:
    name: Pre-Deployment Validation
    uses: ./.github/workflows/predeploy-validation.yml
    with:
      node-version: '20.x'

  deploy-frontend:
    name: Deploy Frontend
    needs: test-before-deploy
    runs-on: ubuntu-latest
    environment:
      name: production-frontend
      url: https://your-app.vercel.app

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-version: latest
          github-comment: false
          vercel-args: '--prod --yes'

  deploy-backend:
    name: Deploy Backend
    needs: test-before-deploy
    runs-on: ubuntu-latest
    environment:
      name: production-backend
      url: https://your-api.onrender.com

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to Render
        uses: johnbeynon/render-deploy-action@v0.0.8
        with:
          service-id: ${{ secrets.RENDER_SERVICE_ID }}
          api-key: ${{ secrets.RENDER_API_KEY }}

      - name: Wait for Deployment
        run: sleep 60

      - name: Health Check
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" ${{ secrets.BACKEND_URL_PRODUCTION }}/health)
          if [ $response -ne 200 ]; then
            echo "Health check failed with status $response"
            exit 1
          fi
          echo "Health check passed"

      - name: Setup Node.js for Smoke Checks
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install Backend Dependencies for Smoke Checks
        working-directory: ./backend
        run: npm ci

      - name: Deployment Smoke Checks
        working-directory: ./backend
        env:
          SMOKE_BASE_URL: ${{ secrets.BACKEND_URL_PRODUCTION }}
          SMOKE_JWT_SECRET: ${{ secrets.JWT_SECRET_PRODUCTION }}
          SMOKE_REQUIRE_AUTH_CHECK: "true"
        run: npm run smoke:api
