# yaml-language-server: disable
name: Performance Audit

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0' # Weekly on Sunday

jobs:
  lighthouse:
    name: Lighthouse Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Install Dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build Frontend
        working-directory: ./frontend
        run: npm run build

      - name: Start Frontend Preview Server
        working-directory: ./frontend
        run: |
          npm run preview -- --host 127.0.0.1 --port 4173 > /tmp/vite-preview.log 2>&1 &

          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:4173 >/dev/null; then
              break
            fi
            sleep 2
          done

          if ! curl -fsS http://127.0.0.1:4173 >/dev/null; then
            echo "Vite preview server failed to start"
            cat /tmp/vite-preview.log
            exit 1
          fi

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v11
        with:
          urls: |
            http://127.0.0.1:4173
          uploadArtifacts: true
          temporaryPublicStorage: true
          runs: 3
