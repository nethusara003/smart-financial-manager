name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20.x'

jobs:
  # Frontend Testing & Build
  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Run Linter
        run: npm run lint

      - name: Check API URL hygiene
        run: npm run check:no-localhost-api

      - name: Run Tests
        run: npm run test:coverage

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./frontend/coverage/lcov.info
          flags: frontend
          name: frontend-coverage

      - name: Build Application
        run: npm run build

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist
          retention-days: 7

  # Backend Testing & Validation
  backend:
    name: Backend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Run Tests
        run: |
          npm run test:coverage || (
            echo "Backend tests failed on first attempt. Retrying once..."
            npm run test:coverage
          )
        env:
          MONGODB_URI: mongodb://localhost:27017/test
          JWT_SECRET: test-secret-key
          NODE_ENV: test

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./backend/coverage/lcov.info
          flags: backend
          name: backend-coverage

      - name: Validate Server Syntax
        run: node --check server.js

      - name: Run API Smoke Checks
        run: |
          npm run start:api > /tmp/backend-smoke.log 2>&1 &
          SERVER_PID=$!

          cleanup() {
            kill $SERVER_PID >/dev/null 2>&1 || true
          }

          trap cleanup EXIT

          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:5000/health >/dev/null; then
              break
            fi
            sleep 2
          done

          if ! curl -fsS http://127.0.0.1:5000/health >/dev/null; then
            echo "Backend server failed to start for smoke checks"
            cat /tmp/backend-smoke.log
            exit 1
          fi

          npm run smoke:api
        env:
          MONGO_URI: mongodb://localhost:27017/smoke_ci
          JWT_SECRET: test-secret-key
          NODE_ENV: test
          FRONTEND_URL: http://localhost:5173
          SMOKE_BASE_URL: http://127.0.0.1:5000
          SMOKE_JWT_SECRET: test-secret-key
          SMOKE_REQUIRE_AUTH_CHECK: "true"

  # Security & Code Quality
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run npm audit (Frontend)
        working-directory: ./frontend
        run: npm audit --audit-level=critical

      - name: Run npm audit (Backend)
        working-directory: ./backend
        run: npm audit --audit-level=critical

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL'
          exit-code: '0'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results.sarif'
        continue-on-error: true
        if: always()
