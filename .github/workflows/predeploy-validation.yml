name: Pre-Deploy Validation

on:
  workflow_call:
    inputs:
      node-version:
        description: Node.js version used for validation jobs
        required: false
        type: string
        default: "20.x"

jobs:
  validate:
    name: Validate Frontend and Backend
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Frontend Lint
        working-directory: ./frontend
        run: npm run lint

      - name: Frontend API URL Hygiene Check
        working-directory: ./frontend
        run: npm run check:no-localhost-api

      - name: Frontend Tests
        working-directory: ./frontend
        run: npm run test:run

      - name: Install Backend Dependencies
        working-directory: ./backend
        run: npm ci

      - name: Backend Tests
        working-directory: ./backend
        run: npm run test
        env:
          MONGODB_URI: mongodb://localhost:27017/test
          JWT_SECRET: test-secret-key
          NODE_ENV: test
