  <!-- Chart Bars -->
  <rect x="35" y="50" width="8" height="15" fill="white" opacity="0.9" rx="2"/>
  <rect x="47" y="45" width="8" height="20" fill="white" opacity="0.9" rx="2"/>
  <rect x="59" y="40" width="8" height="25" fill="white" opacity="0.9" rx="2"/>
  <rect x="71" y="35" width="8" height="30" fill="white" opacity="0.9" rx="2"/>
  
  <!-- Trend Arrow -->
  <path d="M45 35 L75 25 M75 25 L70 30 M75 25 L70 20" stroke="white" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
  
  <!-- SFT Text -->
  <text x="60" y="85" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="white">SFT</text>
</svg>